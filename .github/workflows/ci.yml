name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Type-check backend
        run: cd apps/backend && bunx tsc --noEmit
      - name: Lint frontend
        run: cd apps/frontend && bun run lint
      - name: Build frontend
        run: cd apps/frontend && bun run build
