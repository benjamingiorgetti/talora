<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Chat bubble body -->
  <rect x="1" y="2" width="30" height="24" rx="6" ry="6" fill="#1C1E21"/>
  <!-- Chat bubble tail -->
  <polygon points="6,26 4,31 12,26" fill="#1C1E21"/>
  <!-- Stylized T letter -->
  <rect x="9" y="9" width="14" height="3" rx="1" fill="#FFFFFF"/>
  <rect x="14" y="9" width="4" height="13" rx="1" fill="#FFFFFF"/>
  <!-- Green notification circle with check -->
  <circle cx="26" cy="6" r="5.5" fill="#4CAF50"/>
  <polyline points="23.5,6 25,7.5 28.5,4.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
