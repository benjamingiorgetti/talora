version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bottoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bottoo123}
      POSTGRES_DB: ${POSTGRES_DB:-bottoo}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bottoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-bottoo}:${POSTGRES_PASSWORD:-bottoo123}@postgres:5432/${POSTGRES_DB:-bottoo}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-your-evolution-api-key}
      - SERVER_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - evolution_data:/evolution/instances
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  evolution_data:
